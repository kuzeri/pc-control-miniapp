<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PC Control</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       var(--tg-theme-bg-color,            #1c1c1e);
      --bg2:      var(--tg-theme-secondary-bg-color,   #2c2c2e);
      --text:     var(--tg-theme-text-color,            #ffffff);
      --hint:     var(--tg-theme-hint-color,            #8e8e93);
      --accent:   var(--tg-theme-button-color,          #2481cc);
      --btn-text: var(--tg-theme-button-text-color,     #ffffff);
      --red:    #ff3b30;
      --orange: #ff9500;
      --green:  #34c759;
      --blue:   #007aff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px 16px 120px;
      min-height: 100vh;
      user-select: none;
    }

    h2 {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--hint); margin: 20px 0 10px;
    }
    h2:first-child { margin-top: 0; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      background: var(--bg2); color: var(--text);
      border: none; border-radius: 14px;
      padding: 18px 12px; font-size: 15px; font-weight: 500;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.94); opacity: 0.8; }
    .btn .icon  { font-size: 30px; line-height: 1; }
    .btn .label { font-size: 13px; }
    .btn.red    { background: var(--red);    color: #fff; }
    .btn.orange { background: var(--orange); color: #fff; }
    .btn.green  { background: var(--green);  color: #fff; }
    .btn.blue   { background: var(--blue);   color: #fff; }
    .btn.spotify { background: #1db954;      color: #fff; }

    /* ── Player ── */
    .player {
      background: var(--bg2); border-radius: 14px; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .player-row {
      display: flex; justify-content: center; align-items: center; gap: 12px;
    }
    .pbtn {
      background: rgba(255,255,255,0.08); border: none; border-radius: 50%;
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pbtn:active { transform: scale(0.88); background: rgba(255,255,255,0.18); }
    .pbtn.sm { width: 52px; height: 52px; font-size: 22px; }
    .pbtn.lg { width: 68px; height: 68px; font-size: 32px; background: var(--accent); }
    .player-vol {
      display: flex; justify-content: center; gap: 10px;
    }
    .vbtn {
      flex: 1; background: rgba(255,255,255,0.06); border: none;
      border-radius: 10px; color: var(--text); font-size: 20px;
      padding: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .vbtn:active { background: rgba(255,255,255,0.14); }

    /* ── Card / Input ── */
    .card { background: var(--bg2); border-radius: 14px; padding: 14px; }

    .input {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px 12px; font-size: 14px;
      font-family: 'Menlo', 'Courier New', monospace;
      outline: none; margin-bottom: 10px;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--hint); }

    .run-btn {
      width: 100%; background: var(--accent); color: var(--btn-text);
      border: none; border-radius: 10px; padding: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.1s;
    }
    .run-btn:active { opacity: 0.75; }

    /* ── Result panel ── */
    #result-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      padding: 16px; max-height: 55vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 100;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
    }
    #result-panel.show { transform: translateY(0); }

    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; font-weight: 600; font-size: 15px;
    }
    .result-close {
      background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
      width: 28px; height: 28px; color: var(--text); font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #result-content {
      font-family: 'Menlo', 'Courier New', monospace;
      font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
    }

    /* ── Screenshot modal ── */
    #screenshot-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #screenshot-modal.show { opacity: 1; pointer-events: auto; }
    #screenshot-modal img {
      max-width: 100%; max-height: 90vh;
      border-radius: 8px; touch-action: pinch-zoom;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
      width: 40px; height: 40px; color: white; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ── Setup banner ── */
    #setup-banner {
      background: rgba(255,149,0,0.15); border: 1px solid rgba(255,149,0,0.4);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 16px;
      font-size: 13px; line-height: 1.5; color: #ff9500;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: 14px;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0; pointer-events: none;
      backdrop-filter: blur(8px); white-space: nowrap; z-index: 300;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Loading spinner on btn ── */
    .btn.loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>

  <div id="setup-banner" style="display:none">
    ⚠️ Укажите URL сервера в разделе <b>Настройки</b> ниже, затем перезапустите Mini App.
  </div>

  <h2>Основные действия</h2>
  <div class="grid">
    <button class="btn blue"   onclick="send('screenshot')">
      <span class="icon">📸</span><span class="label">Скриншот</span>
    </button>
    <button class="btn green"  onclick="send('status')">
      <span class="icon">💻</span><span class="label">Статус</span>
    </button>
    <button class="btn orange" onclick="confirmAction('restart')">
      <span class="icon">🔄</span><span class="label">Перезагрузка</span>
    </button>
    <button class="btn red"    onclick="confirmAction('shutdown')">
      <span class="icon">⏻</span><span class="label">Выключить</span>
    </button>
  </div>

  <h2>Системная информация</h2>
  <div class="grid">
    <button class="btn" onclick="send('cpu')">
      <span class="icon">🔥</span><span class="label">CPU</span>
    </button>
    <button class="btn" onclick="send('memory')">
      <span class="icon">🧠</span><span class="label">Память</span>
    </button>
    <button class="btn" onclick="send('disk')">
      <span class="icon">💾</span><span class="label">Диск</span>
    </button>
    <button class="btn" onclick="send('network')">
      <span class="icon">🌐</span><span class="label">Сеть</span>
    </button>
    <button class="btn" onclick="send('processes')">
      <span class="icon">📋</span><span class="label">Процессы</span>
    </button>
    <button class="btn" onclick="send('uptime')">
      <span class="icon">⏱</span><span class="label">Аптайм</span>
    </button>
  </div>

  <h2>Плеер</h2>
  <div class="player">
    <div class="player-row">
      <button class="pbtn sm" onclick="send('prev_track')">⏮</button>
      <button class="pbtn lg" onclick="send('play_pause')">⏯</button>
      <button class="pbtn sm" onclick="send('next_track')">⏭</button>
    </div>
    <div class="player-vol">
      <button class="vbtn" onclick="send('volume_down')">🔈</button>
      <button class="vbtn" onclick="send('mute')">🔇</button>
      <button class="vbtn" onclick="send('stop_media')">⏹</button>
      <button class="vbtn" onclick="send('volume_up')">🔊</button>
    </div>
  </div>

  <h2>Медиа</h2>
  <div class="grid">
    <button class="btn spotify" onclick="send('spotify')">
      <span class="icon">🎵</span><span class="label">Моя музыка</span>
    </button>
    <button class="btn" onclick="send('lock')">
      <span class="icon">🔒</span><span class="label">Блокировка</span>
    </button>
  </div>

  <h2>Выполнить команду</h2>
  <div class="card">
    <input class="input" id="cmd" type="text"
      placeholder="Get-Process | Sort CPU -Desc | Select -First 5"
      autocomplete="off" />
    <button class="run-btn" onclick="sendRun()">▶ Выполнить в PowerShell</button>
  </div>

  <h2>Настройки</h2>
  <div class="card">
    <input class="input" id="api-url" type="url"
      placeholder="https://xxxx.trycloudflare.com" />
    <input class="input" id="api-secret" type="text"
      placeholder="Секретный ключ (если задан в .env)" />
    <button class="run-btn" onclick="saveSettings()">💾 Сохранить</button>
  </div>

  <!-- Result panel -->
  <div id="result-panel">
    <div class="result-header">
      <span id="result-title">Результат</span>
      <button class="result-close" onclick="hideResult()">✕</button>
    </div>
    <div id="result-content"></div>
  </div>

  <!-- Screenshot modal -->
  <div id="screenshot-modal">
    <button class="modal-close" onclick="hideScreenshot()">✕</button>
    <img id="screenshot-img" alt="Screenshot" />
  </div>

  <div id="toast"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const URL_KEY    = 'jarvis_api_url';
    const SECRET_KEY = 'jarvis_api_secret';

    let apiUrl    = localStorage.getItem(URL_KEY)    || '';
    let apiSecret = localStorage.getItem(SECRET_KEY) || '';

    // Fill settings inputs
    document.getElementById('api-url').value    = apiUrl;
    document.getElementById('api-secret').value = apiSecret;

    // Show banner if not configured
    if (!apiUrl) {
      document.getElementById('setup-banner').style.display = 'block';
    }

    // ── Core fetch ──────────────────────────────────────────────────────────
    async function send(action, extra = {}) {
      if (!apiUrl) {
        tg.showAlert('Укажите URL сервера в разделе "Настройки" внизу страницы.');
        return;
      }
      toast('⏳ Выполняю...');
      try {
        const body = { action, ...extra };
        if (apiSecret) body.secret = apiSecret;

        const res = await fetch(apiUrl.replace(/\/$/, '') + '/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) { toast('❌ Ошибка ' + res.status); return; }

        const data = await res.json();

        if (data.type === 'screenshot') {
          hideResult();
          showScreenshot(data.result);
        } else if (data.result) {
          const shortActions = ['play_pause','next_track','prev_track','stop_media',
                                'volume_up','volume_down','mute','lock','spotify',
                                'shutdown','restart'];
          if (shortActions.includes(action)) {
            toast(data.result);
          } else {
            showResult(action, data.result);
          }
        }
      } catch (e) {
        toast('❌ Нет связи с ПК');
      }
    }

    function confirmAction(action) {
      const labels = { shutdown: 'Выключить ПК?', restart: 'Перезагрузить ПК?' };
      tg.showConfirm(labels[action] || 'Выполнить?', ok => { if (ok) send(action); });
    }

    function sendRun() {
      const cmd = document.getElementById('cmd').value.trim();
      if (!cmd) { toast('Введите команду'); return; }
      send('run', { cmd });
    }

    // ── Settings ────────────────────────────────────────────────────────────
    function saveSettings() {
      apiUrl    = document.getElementById('api-url').value.trim();
      apiSecret = document.getElementById('api-secret').value.trim();
      localStorage.setItem(URL_KEY,    apiUrl);
      localStorage.setItem(SECRET_KEY, apiSecret);
      document.getElementById('setup-banner').style.display = apiUrl ? 'none' : 'block';
      toast('✅ Настройки сохранены');
    }

    // ── Result panel ────────────────────────────────────────────────────────
    const TITLES = {
      cpu: '🔥 CPU', memory: '🧠 Память', disk: '💾 Диск',
      network: '🌐 Сеть', processes: '📋 Процессы', uptime: '⏱ Аптайм',
      status: '💻 Статус', run: '⚡ Команда',
    };

    function showResult(action, text) {
      document.getElementById('result-title').textContent = TITLES[action] || 'Результат';
      document.getElementById('result-content').textContent = text;
      document.getElementById('result-panel').classList.add('show');
    }

    function hideResult() {
      document.getElementById('result-panel').classList.remove('show');
    }

    // ── Screenshot modal ────────────────────────────────────────────────────
    function showScreenshot(b64) {
      document.getElementById('screenshot-img').src = 'data:image/jpeg;base64,' + b64;
      document.getElementById('screenshot-modal').classList.add('show');
    }

    function hideScreenshot() {
      document.getElementById('screenshot-modal').classList.remove('show');
    }

    // ── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // Enter in cmd field
    document.getElementById('cmd').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendRun();
    });

    // Close result panel on backdrop tap
    document.getElementById('screenshot-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) hideScreenshot();
    });
  </script>
</body>
</html>
